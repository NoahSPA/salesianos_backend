# Backend solo API: la API corre como función serverless, NO como uvicorn.
# IMPORTANTE: En Netlify UI, el Build command debe estar vacío o coincidir con esto.
[build]
  command = "echo 'Functions only - no build needed'"
  publish = "netlify_public"
  functions = "netlify/functions"

# Todas las peticiones las atiende la función server (FastAPI vía Mangum).
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# CORS: necesario para respuestas de error (404/502) que no pasan por FastAPI.
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://salesianosfrontend.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Credentials = "true"

# Variables de entorno: configurar en Netlify UI o en [context.production.env] aquí.
# No poner secretos en este archivo; usar Netlify UI.
