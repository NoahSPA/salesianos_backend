# Backend solo API: la API corre como función serverless, NO como uvicorn.
# IMPORTANTE: En Netlify UI, el Build command debe estar vacío o coincidir con esto.
[build]
  command = "echo 'Functions only - no build needed'"
  publish = "netlify_public"
  functions = "netlify/functions"

# Incluir app/ en el bundle de la función (Netlify solo empaqueta server.py + pip por defecto).
[functions]
  included_files = ["app/**"]

# Todas las peticiones las atiende la función server (FastAPI vía Mangum).
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# CORS: Edge Function netlify/edge-functions/cors.ts inyecta cabeceras en todas las
# respuestas (incl. 502) y responde OPTIONS sin invocar Lambda.

# Variables de entorno requeridas en Netlify UI: MONGODB_URI, JWT_SECRET,
# CORS_ORIGINS=https://salesianosfrontend.netlify.app, COOKIE_SECURE=true
# No poner secretos en este archivo; usar Netlify UI.
